<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador de Crédito</title>
    <link rel="stylesheet" href="simulador.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800&display=swap" rel="stylesheet">
</head>
<body>

    <div class="container">
        <div class="header">
            <p class="subtitle">Simulador de Credito</p>
        </div>

        <div class="dashboard-grid">
            <div class="form-section">
                <div class="card">
                    <h2>📊 Datos financieros</h2>
                    <div class="input-group">
                        <label for="txtIngresos">Ingresos Mensuales ($):</label>
                        <input type="text" id="txtIngresos" placeholder="Ej. 1500" onblur="validarInput('txtIngresos', 'msgIngresos', 5)">
                        <span id="msgIngresos" class="error-msg"></span>
                    </div>
                    <div class="card">
                        <h2>🛒 Detalle de Gastos</h2>
                        <div class="input-group">
                            <label for="txtArriendo">Arriendo ($):</label>
                            <input type="text" id="txtArriendo" placeholder="Ej. 400" onblur="validarInput('txtArriendo', 'msgArriendo', 5)">
                            <span id="msgArriendo" class="error-msg"></span>
                        </div>
                        <div class="input-group">
                            <label for="txtAlimentacion">Alimentación ($):</label>
                            <input type="text" id="txtAlimentacion" placeholder="Ej. 200" onblur="validarInput('txtAlimentacion', 'msgAlimentacion', 5)">
                            <span id="msgAlimentacion" class="error-msg"></span>
                        </div>
                        <div class="input-group">
                            <label for="txtVarios">Varios ($):</label>
                            <input type="text" id="txtVarios" placeholder="Ej. 100" onblur="validarInput('txtVarios', 'msgVarios', 5)">
                            <span id="msgVarios" class="error-msg"></span>
                        </div>
                    </div>
                </div>

                <div class="card">
                    <h2>💳 Solicitud de crédito</h2>
                    <div class="input-group">
                        <label for="txtMonto">Monto Solicitado ($):</label>
                        <input type="text" id="txtMonto" placeholder="Ej. 5000" onblur="validarInput('txtMonto', 'msgMonto', 5)">
                        <span id="msgMonto" class="error-msg"></span>
                    </div>
                    <div class="input-group">
                        <label for="txtPlazo">Plazo en años:</label>
                        <input type="text" id="txtPlazo" placeholder="Ej. 5" onblur="validarInput('txtPlazo', 'msgPlazo', 2)"> 
                        <span id="msgPlazo" class="error-msg"></span>
                    </div>
                    <div class="input-group">
                        <label for="txtTasaInteres">Tasa de interés anual (%):</label>
                        <input type="text" id="txtTasaInteres" placeholder="Ej. 12" onblur="validarInput('txtTasaInteres', 'msgTasaInteres', 3)">
                        <span id="msgTasaInteres" class="error-msg"></span>
                    </div>
                </div>
            </div>

            <div class="results-section">
                <div class="card results-card">
                    <h2>📈 Análisis</h2>
                    <div class="result-item">
                        <span>Total Gastos:</span>
                        <strong>$<span id="spnTotalGastos">0.00</span></strong>
                    </div>
                    <div class="result-item">
                        <span>Disponible:</span>
                        <strong>$<span id="spnDisponible">0.00</span></strong>
                    </div>
                    <div class="result-item">
                        <span>Capacidad de pago:</span>
                        <strong>$<span id="spnCapacidadPago">0.00</span></strong>
                    </div>
                    
                    <hr>
                    
                    <div class="result-item">
                        <span>Interés a pagar:</span>
                        <strong>$<span id="spnInteresPagar">0.00</span></strong>
                    </div>
                    <div class="result-item">
                        <span>Total préstamo:</span>
                        <strong>$<span id="spnTotalPrestamo">0.00</span></strong>
                    </div>
                    <div class="result-item highlight">
                        <span>Cuota mensual:</span>
                        <strong>$<span id="spnCuotaMensual">0.00</span></strong>
                    </div>

                    <div class="status-box">
                        <p>Estado de crédito</p>
                        <div id="spnEstadoCredito" class="status-badge">ANALIZANDO...</div>
                    </div>
                </div>

                <div class="buttons">
                    <button id="btnCalcularCredito" class="btn-primary" onclick="calcular();">Calcular Crédito</button>
                    <button id="btnReiniciar" class="btn-secondary">Reiniciar</button>
                </div>
            </div>
        </div>
    </div>
    
    <script src="funciones.js"></script>
    <script src="simulador.js"></script>
    <script src="utils.js"></script>
</body>
</html>
